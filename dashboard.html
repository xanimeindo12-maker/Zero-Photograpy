<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Fotoyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Desain CSS Tetap Sama Seperti Sebelumnya */
        :root { --primary: #0f172a; --accent: #3b82f6; --accent-hover: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #334155; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: var(--text); }
        .card { background: var(--surface); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: left; border: 1px solid var(--border); transition: all 0.3s ease; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; }
        h2 { margin: 0 0 8px; font-size: 20px; color: var(--primary); }
        p { color: #64748b; font-size: 14px; margin: 0; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
        input[type="text"], input[type="number"] { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background-color: #f8fafc; box-sizing: border-box; text-align: center; letter-spacing: 2px; font-weight: bold;}
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); background-color: var(--surface); }
        .file-upload-wrapper { position: relative; width: 100%; height: 120px; border: 2px dashed var(--border); border-radius: 8px; display: flex; justify-content: center; align-items: center; background-color: #f8fafc; cursor: pointer; margin-bottom: 20px; }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-text { text-align: center; color: #64748b; font-size: 13px; pointer-events: none; }
        .file-upload-text span { display: block; font-weight: 600; color: var(--accent); font-size: 14px; margin-bottom: 4px; }
        button { width: 100%; background-color: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; margin-bottom: 10px; }
        button:hover { background-color: #000000; }
        button.btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text); }
        button.btn-outline:hover { background-color: #f1f5f9; color: var(--primary); }
        button.btn-upload { background-color: var(--accent); }
        button.btn-upload:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .hidden { display: none; }
        .status-badge { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 500; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-section" class="card fade-in">
        <div class="header">
            <div class="logo">FOTOYU</div>
            <h2>Otorisasi Keamanan</h2>
            <p>Sistem dilindungi otentikasi dua faktor (2FA).</p>
        </div>
        
        <button id="btn-minta-otp" class="btn-outline" onclick="mintaOTP()">1. Kirim Kode Akses ke Gmail Saya</button>
        
        <div id="input-otp-area" class="hidden" style="margin-top: 20px;">
            <div class="form-group">
                <label>Masukkan 6-Digit Kode OTP</label>
                <input type="number" id="admin-otp" placeholder="------" maxlength="6">
            </div>
            <button onclick="cekLogin()">2. Masuk Dashboard</button>
        </div>
    </div>

    <div id="upload-section" class="card hidden">
        <div class="header">
            <div class="logo">FOTOYU</div>
            <h2>Database Cloud</h2>
            <p>Sinkronisasi foto asli ke Google Drive.</p>
        </div>
        
        <div class="form-group">
            <label>ID / Kode Foto</label>
            <input type="text" id="foto-kode" placeholder="Misal: WDG-JKT-001" style="text-align: left; letter-spacing: normal; font-weight: normal;">
        </div>

        <div class="file-upload-wrapper">
            <input type="file" id="foto-file" accept="image/jpeg, image/png" onchange="updateFileName(this)">
            <div class="file-upload-text" id="file-label">
                <span>Pilih File Resolusi Tinggi</span>Maksimal ukuran: 5MB
            </div>
        </div>
        
        <button id="btn-upload" class="btn-upload" onclick="prosesUpload()">Upload ke Server</button>
        <div id="status-text" class="status-badge"></div>
    </div>

    <script>
        // MASUKKAN URL APPS SCRIPT ANDA DI BAWAH INI
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxl4bhW9G3pak60MIPOVI6nVrgREAS4VVj5cn5ZyQdu5WQuoBpuJlrah4Q24VWqA-s3g/exec';
        let savedOTP = '';

        // Fungsi Meminta OTP ke Backend
        function mintaOTP() {
            const btnMinta = document.getElementById('btn-minta-otp');
            btnMinta.innerText = "Mengirim Email...";
            btnMinta.disabled = true;

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "request_otp" })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert("Berhasil! Cek kotak masuk Gmail Anda sekarang.");
                    btnMinta.innerText = "Email Terkirim ✓";
                    document.getElementById('input-otp-area').classList.remove('hidden');
                    document.getElementById('input-otp-area').classList.add('fade-in');
                } else {
                    alert("Gagal mengirim OTP.");
                    btnMinta.innerText = "Coba Lagi";
                    btnMinta.disabled = false;
                }
            })
            .catch(err => { alert("Error koneksi."); btnMinta.disabled = false; });
        }

        function updateFileName(input) {
            const label = document.getElementById('file-label');
            if (input.files && input.files[0]) {
                label.innerHTML = `<span style="color: #10b981;">File Terpilih:</span> ${input.files[0].name}`;
            } else {
                label.innerHTML = `<span>Pilih File Resolusi Tinggi</span>Maksimal ukuran: 5MB`;
            }
        }

        // Simpan OTP sementara di sisi klien, validasi asli ada di Backend
        function cekLogin() {
            const otp = document.getElementById('admin-otp').value;
            if(otp.length < 5) { alert("Masukkan kode OTP yang valid."); return; }
            savedOTP = otp; 
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('upload-section').classList.remove('hidden');
            document.getElementById('upload-section').classList.add('fade-in');
        }

        // Upload File membawa Kode OTP
        function prosesUpload() {
            const kodeFoto = document.getElementById('foto-kode').value.trim();
            const fileInput = document.getElementById('foto-file').files[0];
            const btnUpload = document.getElementById('btn-upload');
            const statusText = document.getElementById('status-text');

            if(!kodeFoto || !fileInput) { alert("Isi ID Foto dan pilih file."); return; }

            btnUpload.disabled = true;
            btnUpload.innerText = "Mengunggah...";
            statusText.style.color = "#3b82f6";
            statusText.innerText = "Sistem membaca file...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1]; 

                const dataKirim = {
                    action: "upload_foto",
                    otp: savedOTP, // Mengirim OTP alih-alih password statis
                    nama_file: kodeFoto + ".jpg",
                    mimeType: fileInput.type,
                    fileData: base64Data
                };

                statusText.innerText = "Sinkronisasi ke Google Drive...";

                fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(dataKirim)
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === "success") {
                        statusText.style.color = "#10b981"; 
                        statusText.innerText = "Upload Berhasil!";
                        alert(data.pesan);
                        document.getElementById('foto-kode').value = '';
                        document.getElementById('foto-file').value = '';
                        updateFileName(document.getElementById('foto-file'));
                    } else {
                        statusText.style.color = "#ef4444"; 
                        statusText.innerText = "Gagal. Otorisasi ditolak.";
                        alert("Gagal: " + data.pesan);
                    }
                    resetUploadUI();
                })
                .catch(err => { resetUploadUI(); });
            };
            reader.readAsDataURL(fileInput);
        }

        function resetUploadUI() {
            const btnUpload = document.getElementById('btn-upload');
            btnUpload.disabled = false;
            btnUpload.innerText = "Upload ke Server";
        }
    </script>
</body>
</html>
